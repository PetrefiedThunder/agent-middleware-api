[mypy]
python_version = 3.11
strict = false
warn_return_any = false
warn_unused_configs = false
disallow_untyped_defs = false
ignore_missing_imports = true
check_untyped_defs = false
disable_error_code =
    arg-type,
    assignment,
    attr-defined,
    call-arg,
    call-overload,
    dict-item,
    index,
    misc,
    name-defined,
    no-any-return,
    no-redef,
    typeddict-item,
    union-attr,
    valid-type,
    var-annotated

[mypy-tests.*]
ignore_errors = true
