repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # mypy runs from the project environment (language: system), matching
  # scripts/core_quality_gate.sh exactly. The previous mirrors-mypy setup used
  # an isolated env + the unbuildable `types-all` dep, which broke the hook;
  # an isolated env also lacks the project's runtime deps, so types resolve to
  # Any and produce spurious errors. Running in-project keeps the two in sync.
  - repo: local
    hooks:
      - id: mypy
        name: mypy (project env)
        entry: python3.12 -m mypy --config-file=mypy.ini app/
        language: system
        types: [python]
        pass_filenames: false
