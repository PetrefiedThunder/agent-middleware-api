name: CI — Agent-Native Middleware API

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio anyio httpx

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Validate OpenAPI spec generates
        run: |
          python -c "
          from app.main import app
          from fastapi.openapi.utils import get_openapi
          spec = get_openapi(title=app.title, version=app.version, description=app.description, routes=app.routes)
          paths = spec.get('paths', {})
          print(f'OpenAPI: {len(paths)} paths validated')
          assert len(paths) > 20, f'Expected >20 paths, got {len(paths)}'
          "

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install linters
        run: pip install ruff

      - name: Run ruff
        run: ruff check app/ tests/

