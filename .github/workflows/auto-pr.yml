name: Autonomous PM — Auto-PR Generator

# Runs every 6 hours to check for anomalies and generate fixes
on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  analyze-and-fix:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install httpx

      - name: Check for anomalies
        id: anomalies
        env:
          API_URL: ${{ secrets.MIDDLEWARE_API_URL }}
          API_KEY: ${{ secrets.MIDDLEWARE_API_KEY }}
        run: |
          python -c "
          import httpx
          import os
          import json

          api_url = os.environ.get('API_URL')
          if not api_url:
              print('API_URL not configured. Skipping anomaly check.')
              exit(0)

          api_key = os.environ.get('API_KEY') or 'dev-key'

          headers = {'X-API-Key': api_key}

          # Fetch critical and high severity anomalies
          resp = httpx.get(
              f'{api_url}/v1/telemetry/anomalies',
              params={'severity': 'critical'},
              headers=headers,
          )

          if resp.status_code != 200:
              print(f'Failed to fetch anomalies: {resp.status_code}')
              exit(0)

          data = resp.json()
          anomalies = data.get('anomalies', [])

          if not anomalies:
              print('No critical anomalies found. All clear.')
              exit(0)

          print(f'Found {len(anomalies)} critical anomalies')

          # Generate fix for the most recent anomaly
          anomaly = anomalies[0]
          print(f'Generating fix for: {anomaly[\"summary\"]}')

          fix_resp = httpx.post(
              f'{api_url}/v1/telemetry/anomalies/{anomaly[\"anomaly_id\"]}/auto-pr',
              json={'anomaly_id': anomaly['anomaly_id'], 'dry_run': True},
              headers=headers,
          )

          if fix_resp.status_code == 200:
              fix_data = fix_resp.json()
              print(f'Fix generated. Files changed: {fix_data.get(\"files_changed\", [])}')

              # Write fix details for the PR creation step
              with open('/tmp/fix_details.json', 'w') as f:
                  json.dump({
                      'anomaly': anomaly,
                      'fix': fix_data,
                  }, f)

              # Signal that we have a fix
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                  f.write('has_fix=true\n')
          else:
              print(f'Fix generation failed: {fix_resp.status_code}')
          "

      - name: Apply fix and create PR
        if: steps.anomalies.outputs.has_fix == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: |
            fix: auto-generated fix from Autonomous PM

            Generated by the Autonomous Product Manager based on
            telemetry anomaly detection.
          title: "[Auto-PM] Autonomous fix for detected anomaly"
          body: |
            ## Autonomous Fix

            This PR was automatically generated by the **Autonomous Product Manager**
            pipeline based on live telemetry anomaly detection.

            ### How This Works
            1. Telemetry events are continuously ingested via `POST /v1/telemetry/events`
            2. The anomaly detector runs every 60 seconds, looking for error spikes and regressions
            3. When critical anomalies are found, the Auto-PR generator creates a fix
            4. This PR contains the proposed fix for human review

            ### Review Checklist
            - [ ] Verify the fix addresses the root cause
            - [ ] Check that no unrelated changes are included
            - [ ] Confirm tests pass

            ---
            *Generated by CI/CD Auto-PR Pipeline — `auto-pr.yml`*
          branch: auto-pm/fix-${{ github.run_number }}
          base: master
          labels: |
            auto-pm
            needs-review
